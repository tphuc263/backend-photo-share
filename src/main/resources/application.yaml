spring:
  application:
    name: tphucshareapp
  data:
    mongodb:
#      host: ${MONGO_HOST:localhost}
#      port: ${MONGO_PORT:27018}
#      database: ${MONGO_DATABASE:share_app_database}
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DATABASE:share_app_database_new}?socketTimeoutMS=30000
      auto-index-creation: false
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
      repositories:
        enabled: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  task:
    scheduling:
      pool:
        size: 3
    execution:
      pool:
        core-size: 4
        max-size: 8

api:
  prefix: /api/v1

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

cloudinary:
  cloudName: ${CLOUDINARY_CLOUD_NAME}
  apiKey: ${CLOUDINARY_API_KEY}
  apiSecret: ${CLOUDINARY_API_SECRET}
  apiSecure: true

auth:
  token:
    jwtSecret: ${JWT_SECRET}
    accessExpirationInMils: 7200000

newsfeed:
  cache:
    ttl-hours: 2
    max-items: 200
  relevance:
    window-days: 7
  batch:
    size: 50

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always

open:
  api:
    title: API document
    version: v1.0.0
    description: ShareApp Api document
    serverUrl: http://localhost:8080